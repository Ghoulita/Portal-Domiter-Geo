<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domiter UCV - Portal Académico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-oro: #d4af37;
            --color-marron-oscuro: #2c241b;
            --color-fondo: #fcfcfc;
        }
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: var(--color-fondo);
            color: var(--color-marron-oscuro);
            line-height: 1.6;
        }
        .minimalist-card {
            background: white;
            border: 1px solid #eaeaea;
            transition: all 0.3s ease;
        }
        .minimalist-card:hover {
            border-color: var(--color-oro);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transform: translateY(-2px);
        }
        
        /* Estilos de los Modales */
        .modal-overlay {
            display: none;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.active {
            display: flex;
        }

        /* Estilos de la Cuadrícula del Pensum */
        .pensum-grid {
            display: grid;
            grid-template-columns: repeat(10, minmax(140px, 1fr));
            gap: 16px;
            width: max-content;
            padding-bottom: 20px;
        }
        .semestre-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .materia-box {
            border: 1px solid #ccc;
            padding: 10px 8px;
            text-align: center;
            font-size: 0.75rem;
            cursor: pointer;
            background-color: white;
            transition: all 0.3s ease;
            position: relative;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .materia-box:hover {
            border-color: var(--color-oro);
        }
        .materia-box.active {
            background-color: var(--color-oro);
            color: white;
            border-color: var(--color-oro);
        }
        .materia-box.pre-req {
            background-color: #fef0c7;
            border-color: #f59e0b;
        }
        .materia-box.post-req {
            background-color: #e0f2fe;
            border-color: #0ea5e9;
        }
        .materia-codigo {
            color: #888;
            font-size: 0.65rem;
            margin-top: 4px;
        }
        .materia-box.active .materia-codigo,
        .materia-box.pre-req .materia-codigo,
        .materia-box.post-req .materia-codigo {
            color: inherit;
        }
        /* Leyenda */
        .leyenda span {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 6px;
            border: 1px solid #ccc;
        }

        /* Estilos para pestañas del Horario */
        .tab-btn {
            padding: 8px 16px;
            border-bottom: 2px solid transparent;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
